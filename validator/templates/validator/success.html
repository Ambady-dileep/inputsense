<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congratulations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d1a 0%, #0f1f3d 35%, #1a0a2e 65%, #0d1f1a 100%);
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(2px);
    }
    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(120,60,255,0.4) 0%, transparent 65%);
      top: -200px; left: -200px;
      animation: drift1 10s ease-in-out infinite;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(0,200,255,0.3) 0%, transparent 65%);
      bottom: -150px; right: -150px;
      animation: drift2 13s ease-in-out infinite;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,80,180,0.25) 0%, transparent 65%);
      top: 50%; left: 55%;
      animation: drift3 9s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(50px,40px) scale(1.07); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-40px,-50px) scale(1.1); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%      { transform: translate(-50%,-50%) scale(1.15) rotate(20deg); }
    }

    /* ── Glass card ── */
    .glass-card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 36px;
      padding: 3.5rem 3rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow:
        0 12px 48px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(0,0,0,0.12);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(50px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Trophy / star burst ── */
    .trophy-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 1.8rem;
    }

    .trophy-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, rgba(255,210,60,0.8), rgba(255,100,200,0.6), rgba(80,180,255,0.7)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spinRing 4s linear infinite;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .trophy-bg {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,200,50,0.2), rgba(255,100,180,0.15));
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      animation: trophyPop 0.7s cubic-bezier(0.34,1.76,0.64,1) 0.4s both;
    }

    @keyframes trophyPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Sparkles around trophy ── */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      animation: sparklePulse 2.5s ease-in-out infinite;
    }
    .sparkle:nth-child(1) { top: -4px;  left: 50%; transform: translateX(-50%); animation-delay: 0s; background: #ffd23f; }
    .sparkle:nth-child(2) { top: 15%;   right: -4px; animation-delay: 0.4s; background: #ff6eb4; }
    .sparkle:nth-child(3) { bottom: -4px; left: 50%; transform: translateX(-50%); animation-delay: 0.8s; background: #50c8ff; }
    .sparkle:nth-child(4) { top: 15%;   left: -4px; animation-delay: 1.2s; background: #a78bfa; }
    .sparkle:nth-child(5) { top: 50%;   right: -6px; transform: translateY(-50%); animation-delay: 0.2s; background: #ffd23f; width:4px; height:4px; }
    .sparkle:nth-child(6) { top: 50%;   left: -6px;  transform: translateY(-50%); animation-delay: 0.6s; background: #50c8ff; width:4px; height:4px; }

    @keyframes sparklePulse {
      0%,100% { opacity: 0; transform: scale(0.5) translateX(var(--tx,0)); }
      50%      { opacity: 1; transform: scale(1.4) translateX(var(--tx,0)); }
    }

    /* ── Main heading ── */
    .congrats-text {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffd23f 0%, #ff6eb4 45%, #50c8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShimmer 3s ease-in-out infinite, textIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
      background-size: 200% 200%;
    }

    @keyframes textShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Subtitle ── */
    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-top: 0.6rem;
      letter-spacing: 0.02em;
      animation: fadeUp 0.6s ease 0.7s both;
    }

    /* ── Divider ── */
    .glass-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin: 1.8rem 0;
      animation: fadeUp 0.6s ease 0.9s both;
    }

    /* ── Info pill ── */
    .info-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 100px;
      padding: 0.5rem 1.1rem;
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      animation: fadeUp 0.6s ease 1s both;
    }

    .info-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74,222,128,0.8);
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.7; }
    }

    /* ── CTA Button ── */
    .cta-btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, rgba(130,90,255,0.85), rgba(70,140,255,0.85));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(100,110,255,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.22s ease;
      animation: fadeUp 0.6s ease 1.1s both;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(100,110,255,0.55), inset 0 1px 0 rgba(255,255,255,0.2);
      background: linear-gradient(135deg, rgba(145,105,255,0.95), rgba(80,155,255,0.95));
    }

    .cta-btn:active { transform: scale(0.99); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Floating confetti particles ── */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall linear infinite;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      80%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.5); }
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Confetti container (filled by JS) -->
  <div class="confetti-wrap" id="confetti"></div>

  <!-- Glass card -->
  <div class="glass-card">

    <!-- Trophy -->
    <div class="trophy-wrap">
      <div class="trophy-ring"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="trophy-bg">🏆</div>
    </div>

    <!-- Heading -->
    <div class="congrats-text">Congratulations!</div>
    <p class="subtitle">You've successfully validated your input.</p>

    <div class="glass-divider"></div>

    <!-- Status pill -->
    <div class="info-pill">
      <span class="dot"></span>
      Validation Complete
    </div>

    <!-- CTA -->
    <a href="/" class="cta-btn">← Back to Home</a>

  </div>

  <script>
    // Generate confetti
    const colors = ['#ffd23f','#ff6eb4','#50c8ff','#a78bfa','#4ade80','#fb923c'];
    const container = document.getElementById('confetti');
    const count = 55;

    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';

      const size = Math.random() * 8 + 5;
      const isCircle = Math.random() > 0.5;

      el.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: ${isCircle ? '50%' : '2px'};
        animation-duration: ${Math.random() * 5 + 4}s;
        animation-delay: ${Math.random() * 6}s;
        opacity: 0;
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
